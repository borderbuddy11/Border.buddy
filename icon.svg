<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4E7C6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#345A4D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond arrondi avec gradient -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Cercles décoratifs -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(212,200,154,0.1)" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Double B stylisé -->
  <!-- Premier B (blanc crème) -->
  <text x="155" y="365" font-family="Georgia, serif" font-size="200" font-weight="900" fill="#FFFDF9" text-anchor="middle" opacity="0.98">B</text>
  
  <!-- Deuxième B (or doux) -->
  <text x="330" y="365" font-family="Georgia, serif" font-size="200" font-weight="900" fill="#D4C89A" text-anchor="middle" opacity="0.92">B</text>
  
  <!-- Accent cœur en bas -->
  <circle cx="256" cy="430" r="14" fill="#B8893A" opacity="0.4"/>
  <circle cx="256" cy="430" r="9" fill="#D4C89A" opacity="0.65"/>
  
  <!-- Petites touches décoratives -->
  <circle cx="85" cy="85" r="5" fill="#D4C89A" opacity="0.25"/>
  <circle cx="427" cy="85" r="5" fill="#D4C89A" opacity="0.25"/>
</svg>
